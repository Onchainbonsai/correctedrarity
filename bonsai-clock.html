<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="盆栽時計"/>
  <title>盆栽時計</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      width:100vw; height:100vh;
      overflow:hidden;
      background:#030504;
      font-family: 'EB Garamond', Georgia, serif;
      touch-action: none;
    }

    /* ── ENTRY SCREEN ── */
    #entry {
      position:fixed; inset:0; z-index:100;
      background:#030504;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding: env(safe-area-inset-top,20px) 32px env(safe-area-inset-bottom,20px);
      gap:0;
    }

    .e-kanji {
      font-size:80px; line-height:1;
      margin-bottom:24px;
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform:translateY(0) scale(1); opacity:0.5; }
      50%      { transform:translateY(-8px) scale(1.03); opacity:0.8; }
    }

    .e-title {
      font-size:28px; font-weight:300;
      color:#d8d0c0; text-align:center;
      margin-bottom:6px; letter-spacing:0.02em;
    }
    .e-title em { font-style:italic; color:#5a8c5b; }

    .e-sub {
      font-size:14px; color:#4a4a40;
      text-align:center; line-height:1.7;
      margin-bottom:44px; font-style:italic;
    }

    .e-input {
      width:100%; max-width:320px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:14px;
      padding:15px 18px;
      color:#e8e0d0; font-size:13px;
      font-family:'Courier New',monospace;
      outline:none; letter-spacing:0.01em;
      margin-bottom:10px;
      -webkit-appearance:none;
      transition:border-color 0.25s;
    }
    .e-input:focus { border-color:rgba(90,140,91,0.5); }
    .e-input::placeholder {
      font-family:'EB Garamond',serif;
      font-size:15px; font-style:italic;
      color:#3a3a32; letter-spacing:0;
    }

    .e-btn {
      width:100%; max-width:320px;
      background:linear-gradient(135deg, #3d5a3e, #2a3d2b);
      color:#d8d8c8; border:none;
      border-radius:14px; padding:16px;
      font-family:'EB Garamond',serif;
      font-size:17px; font-style:italic;
      letter-spacing:0.03em;
      cursor:pointer;
      -webkit-appearance:none;
      transition:all 0.2s;
      box-shadow:0 4px 20px rgba(61,90,62,0.3);
    }
    .e-btn:active { transform:scale(0.97); box-shadow:none; }
    .e-btn:disabled { background:#1a1a14; color:#3a3a32; box-shadow:none; }

    .e-status {
      margin-top:18px; font-size:13px;
      color:#5a8c5b; text-align:center;
      min-height:20px; font-style:italic;
    }
    .e-status.err { color:#c97a7a; font-style:normal; font-size:12px; font-family:'Courier New',monospace; }

    /* ── CLOCK SCREEN ── */
    #clock {
      position:fixed; inset:0; z-index:50;
      display:none;
      background:#030504;
    }

    /* Bonsai fills entire screen */
    #bonsaiContainer {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    #bonsaiContainer svg {
      width:100vw !important;
      height:100vh !important;
      min-width:100%; min-height:100%;
      object-fit:cover;
      display:block;
    }

    #bonsaiContainer img {
      width:100vw; height:100vh;
      object-fit:cover; display:block;
    }

    /* Dark overlay — subtle, lets bonsai breathe */
    #clockOverlay {
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(3,5,4,0.1) 0%, rgba(3,5,4,0.5) 100%),
        linear-gradient(to bottom,
          rgba(3,5,4,0.6) 0%,
          rgba(3,5,4,0.0) 25%,
          rgba(3,5,4,0.0) 60%,
          rgba(3,5,4,0.7) 100%);
      pointer-events:none;
    }

    /* Time display — centered, big */
    #timeDisplay {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%, -50%);
      text-align:center;
      pointer-events:none;
      z-index:10;
    }

    #timeHM {
      font-size:clamp(72px, 22vw, 120px);
      font-weight:300;
      color:rgba(240,235,224,0.92);
      letter-spacing:-2px;
      line-height:1;
      text-shadow:
        0 0 40px rgba(3,5,4,0.8),
        0 2px 20px rgba(3,5,4,0.9);
    }

    #timeS {
      font-size:clamp(20px, 6vw, 36px);
      font-weight:300;
      color:rgba(240,235,224,0.45);
      letter-spacing:2px;
      margin-top:4px;
      text-shadow:0 0 20px rgba(3,5,4,0.9);
    }

    #dateDisplay {
      margin-top:10px;
      font-size:clamp(13px, 3.5vw, 18px);
      font-weight:300;
      font-style:italic;
      color:rgba(180,170,150,0.6);
      letter-spacing:0.08em;
      text-shadow:0 0 15px rgba(3,5,4,0.9);
    }

    /* Top info bar */
    #topBar {
      position:absolute;
      top:0; left:0; right:0;
      padding:env(safe-area-inset-top,16px) 20px 0;
      display:flex; align-items:flex-start; justify-content:space-between;
      z-index:10;
    }

    #bonsaiName {
      font-size:13px; font-style:italic;
      color:rgba(200,192,170,0.6);
      text-shadow:0 0 10px rgba(3,5,4,0.9);
      padding-top:6px;
    }

    #backBtn {
      font-size:11px;
      color:rgba(90,140,91,0.6);
      background:rgba(3,5,4,0.4);
      border:1px solid rgba(90,140,91,0.2);
      border-radius:8px;
      padding:5px 10px;
      cursor:pointer;
      -webkit-appearance:none;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      margin-top:4px;
    }

    /* Bottom info */
    #bottomBar {
      position:absolute;
      bottom:0; left:0; right:0;
      padding:0 20px env(safe-area-inset-bottom,20px);
      display:flex; align-items:flex-end; justify-content:space-between;
      z-index:10;
    }

    #stageInfo {
      font-size:11px;
      color:rgba(90,140,91,0.5);
      font-family:'Courier New',monospace;
      letter-spacing:0.05em;
      text-shadow:0 0 10px rgba(3,5,4,0.9);
      padding-bottom:4px;
    }

    #rankInfo {
      font-size:11px;
      color:rgba(150,140,120,0.4);
      font-family:'Courier New',monospace;
      letter-spacing:0.05em;
      text-shadow:0 0 10px rgba(3,5,4,0.9);
      padding-bottom:4px;
      text-align:right;
    }

    /* Loading state inside clock */
    #clockLoading {
      position:absolute; inset:0; z-index:20;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px;
      background:#030504;
    }
    .cl-icon {
      font-size:48px;
      animation:grow 2s ease-in-out infinite alternate;
    }
    @keyframes grow {
      from { transform:scale(0.8); opacity:0.4; }
      to   { transform:scale(1.1); opacity:0.9; }
    }
    .cl-txt { font-size:15px; font-style:italic; color:#4a4a40; }

    /* Tap to change bonsai */
    #tapHint {
      position:absolute; bottom:env(safe-area-inset-bottom,20px);
      left:50%; transform:translateX(-50%);
      font-size:10px; color:rgba(255,255,255,0.15);
      font-family:'Courier New',monospace;
      letter-spacing:0.08em;
      z-index:10;
      pointer-events:none;
      animation:fadeHint 3s ease 3s forwards;
    }
    @keyframes fadeHint { to { opacity:0; } }
  </style>
</head>
<body>

<!-- ENTRY -->
<div id="entry">
  <div class="e-kanji">盆栽</div>
  <div class="e-title">盆栽時計<br/><em>Bonsai Clock</em></div>
  <div class="e-sub">Your bonsai, alive.<br/>Your time, present.</div>
  <input class="e-input" id="addrInput" type="text"
    placeholder="Ethereum address (0x…)"
    autocomplete="off" autocorrect="off"
    autocapitalize="none" spellcheck="false"/>
  <button class="e-btn" id="goBtn" onclick="start()">Open the Clock</button>
  <div class="e-status" id="eStatus"></div>
</div>

<!-- CLOCK -->
<div id="clock">
  <div id="bonsaiContainer"></div>
  <div id="clockOverlay"></div>

  <div id="topBar">
    <div id="bonsaiName"></div>
    <button id="backBtn" onclick="goBack()">← Garden</button>
  </div>

  <div id="timeDisplay">
    <div id="timeHM">00:00</div>
    <div id="timeS">00</div>
    <div id="dateDisplay"></div>
  </div>

  <div id="bottomBar">
    <div id="stageInfo"></div>
    <div id="rankInfo"></div>
  </div>

  <div id="clockLoading">
    <div class="cl-icon">🌱</div>
    <div class="cl-txt">Summoning your bonsai…</div>
  </div>

  <div id="tapHint">TAP TO CHANGE BONSAI</div>
</div>

<script>
const KEY      = "b7db8fa50a88f6083c38c478c5c3d58d";
const CONTRACT = "0xd1bd61c856c1aee57f0439bc018a2b712ce89580";
const SLUG     = "onchainbonsai";
const RPCS     = [
  "https://ethereum.publicnode.com",
  "https://eth.drpc.org",
  "https://rpc.payload.de",
  "https://1rpc.io/eth",
];

const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let myBonsais  = [];
let currentIdx = 0;
let clockTimer = null;
let rankMap    = {};

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(msg, err=false) {
  const el = document.getElementById("eStatus");
  el.textContent = msg;
  el.className = "e-status" + (err?" err":"");
}

// ── Clock tick ───────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const h  = String(now.getHours()).padStart(2,"0");
  const m  = String(now.getMinutes()).padStart(2,"0");
  const s  = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("timeHM").textContent = `${h}:${m}`;
  document.getElementById("timeS").textContent  = s;
  document.getElementById("dateDisplay").textContent =
    `${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}

// ── Fetch live SVG from blockchain ───────────────────────────────
async function fetchLiveSVG(tokenId) {
  const selector = "0xc87b56dd";
  const padded   = parseInt(tokenId).toString(16).padStart(64,"0");
  for (const rpc of RPCS) {
    try {
      const res = await fetch(rpc, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          jsonrpc:"2.0", id:1,
          method:"eth_call",
          params:[{to:CONTRACT, data:selector+padded},"latest"]
        }),
        signal: (() => { const c = new AbortController(); setTimeout(() => c.abort(), 7000); return c.signal; })(),
      });
      const data = await res.json();
      const hex  = data.result;
      if (!hex || hex==="0x") continue;
      const raw = hex.slice(2);
      if (raw.length < 128) continue;
      const len    = parseInt(raw.slice(64,128),16);
      const strHex = raw.slice(128, 128+len*2);
      let str = "";
      for (let i=0; i<strHex.length; i+=2)
        str += String.fromCharCode(parseInt(strHex.slice(i,i+2),16));

      let meta;
      if (str.startsWith("data:application/json;base64,"))
        meta = JSON.parse(atob(str.replace("data:application/json;base64,","")));
      else if (str.startsWith("data:application/json,"))
        meta = JSON.parse(decodeURIComponent(str.replace("data:application/json,","")));
      else if (str.startsWith("{"))
        meta = JSON.parse(str);

      return meta?.image || null;
    } catch(e) { continue; }
  }
  return null;
}

// ── Render bonsai into clock background ──────────────────────────
async function renderBonsai(bonsai) {
  const container = document.getElementById("bonsaiContainer");
  container.innerHTML = "";

  const image = bonsai.cachedImage;

  if (image && (image.startsWith("<svg") || image.includes("<svg"))) {
    // Inline animated SVG — fills entire screen
    const wrap = document.createElement("div");
    wrap.style.cssText = "width:100vw;height:100vh;overflow:hidden;position:absolute;inset:0";
    wrap.innerHTML = image;
    const svg = wrap.querySelector("svg");
    if (svg) {
      svg.removeAttribute("width");
      svg.removeAttribute("height");
      svg.style.cssText = "width:100vw!important;height:100vh!important;display:block;position:absolute;inset:0";
      svg.setAttribute("preserveAspectRatio","xMidYMid slice");
      svg.setAttribute("viewBox", svg.getAttribute("viewBox") || "0 0 100 100");
    }
    container.appendChild(wrap);
  } else if (image && image.startsWith("data:image/svg")) {
    // Base64 SVG
    try {
      const decoded = atob(image.split(",")[1]);
      const wrap = document.createElement("div");
      wrap.style.cssText = "width:100vw;height:100vh;overflow:hidden;position:absolute;inset:0";
      wrap.innerHTML = decoded;
      const svg = wrap.querySelector("svg");
      if (svg) {
        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.style.cssText = "width:100vw!important;height:100vh!important;display:block";
        svg.setAttribute("preserveAspectRatio","xMidYMid slice");
      }
      container.appendChild(wrap);
    } catch(e) {
      const img = document.createElement("img");
      img.src = image;
      container.appendChild(img);
    }
  } else {
    // Fallback image URL
    const src = image || bonsai.display_image_url || bonsai.image_url || "";
    if (src) {
      const img = document.createElement("img");
      img.src = src;
      container.appendChild(img);
    }
  }

  // Update info labels
  const traits = bonsai.traits || [];
  const stage  = traits.find(t => t.trait_type?.toLowerCase()==="stage")?.value || "";
  const age    = traits.find(t => t.trait_type?.toLowerCase()==="age (months)")?.value;
  const rank   = rankMap[String(bonsai.identifier)] || null;
  const isNamed= traits.some(t => t.trait_type==="Name");

  document.getElementById("bonsaiName").textContent =
    bonsai.name || `Bonsai #${bonsai.identifier}`;
  document.getElementById("stageInfo").textContent =
    [stage, age!=null?`Age ${age}mo`:""].filter(Boolean).join(" · ");
  document.getElementById("rankInfo").textContent =
    isNamed ? "✦ Named · #1 / 3200" : rank ? `#${rank} / 3200` : "";
}

// ── Fetch OpenSea NFTs ───────────────────────────────────────────
async function fetchHolderNFTs(addr) {
  let nfts=[], cursor=null;
  do {
    const url = new URL(`https://api.opensea.io/api/v2/chain/ethereum/account/${addr}/nfts`);
    url.searchParams.set("collection",SLUG);
    url.searchParams.set("limit","200");
    if (cursor) url.searchParams.set("next",cursor);
    const res = await fetch(url,{headers:{"x-api-key":KEY}});
    if (!res.ok) throw new Error("Could not load NFTs");
    const d = await res.json();
    nfts = nfts.concat(d.nfts||[]);
    cursor = d.next||null;
  } while(cursor);
  return nfts;
}

async function fetchNFTDetail(tokenId) {
  const res = await fetch(
    `https://api.opensea.io/api/v2/chain/ethereum/contract/${CONTRACT}/nfts/${tokenId}`,
    {headers:{"x-api-key":KEY}}
  );
  if (!res.ok) return null;
  return (await res.json()).nft;
}

async function loadRankMap() {
  try {
    const res = await fetch("rankings.json");
    if (!res.ok) return;
    const data = await res.json();
    for (const r of (data.rankings||[])) rankMap[String(r.id)] = r.rank;
  } catch(e) {}
}

// ── Tap to cycle bonsais ─────────────────────────────────────────
document.getElementById("bonsaiContainer").addEventListener("click", async () => {
  if (myBonsais.length <= 1) return;
  currentIdx = (currentIdx + 1) % myBonsais.length;
  const next = myBonsais[currentIdx];
  if (!next.cachedImage) {
    next.cachedImage = await fetchLiveSVG(next.identifier)
      || next.display_image_url || next.image_url;
  }
  await renderBonsai(next);
});

// ── MAIN ─────────────────────────────────────────────────────────
async function start() {
  const addr = document.getElementById("addrInput").value.trim();
  if (!addr.match(/^0x[0-9a-fA-F]{40}$/)) {
    setStatus("Invalid Ethereum address.", true); return;
  }
  try { localStorage.setItem("ocb_clock_addr", addr); } catch(e) {}
  document.getElementById("goBtn").disabled = true;
  setStatus("Loading your garden…");

  try {
    // Switch to clock screen immediately
    document.getElementById("entry").style.display = "none";
    document.getElementById("clock").style.display  = "block";

    // Start clock
    tickClock();
    clockTimer = setInterval(tickClock, 1000);

    // Load data in parallel
    const [nfts] = await Promise.all([
      fetchHolderNFTs(addr),
      loadRankMap()
    ]);

    if (!nfts.length) throw new Error("No bonsai found at this address.");

    // Sort by rarity
    const sorted = nfts
      .map(n => ({...n, rank: rankMap[String(n.identifier)]||9999}))
      .sort((a,b) => a.rank - b.rank);

    myBonsais  = sorted;
    currentIdx = 0;

    // Fetch detail + live SVG for first (rarest) bonsai
    const first  = myBonsais[0];
    const detail = await fetchNFTDetail(first.identifier);
    if (detail) Object.assign(first, detail);

    // Try live on-chain SVG
    const svg = await fetchLiveSVG(first.identifier);
    first.cachedImage = svg || first.display_image_url || first.image_url;

    await renderBonsai(first);

    // Hide loading
    document.getElementById("clockLoading").style.display = "none";

    // Prefetch next 3 bonsais in background
    for (let i=1; i<Math.min(4, myBonsais.length); i++) {
      const b = myBonsais[i];
      fetchLiveSVG(b.identifier).then(s => {
        b.cachedImage = s || b.display_image_url || b.image_url;
      });
      await sleep(500);
    }

  } catch(e) {
    document.getElementById("clock").style.display  = "none";
    document.getElementById("entry").style.display  = "flex";
    clearInterval(clockTimer);
    document.getElementById("goBtn").disabled = false;
    setStatus(e.message, true);
  }
}

function goBack() {
  clearInterval(clockTimer);
  document.getElementById("clock").style.display  = "none";
  document.getElementById("clockLoading").style.display = "flex";
  document.getElementById("bonsaiContainer").innerHTML = "";
  document.getElementById("entry").style.display  = "flex";
  document.getElementById("goBtn").disabled = false;
  myBonsais = []; currentIdx = 0;
  setStatus("");
}

// Restore last address
try {
  const saved = localStorage.getItem("ocb_clock_addr");
  if (saved) document.getElementById("addrInput").value = saved;
} catch(e) {}
document.getElementById("addrInput").addEventListener("keydown", e => {
  if (e.key==="Enter") { e.preventDefault(); start(); }
});
</script>
</body>
</html>
